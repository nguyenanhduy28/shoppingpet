version: '3.8'

services:
  # MongoDB Database Service
  database:
    image: mongo:6-jammy
    container_name: shopping_pet_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: shopping-pet

  # Backend (Node.js) Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopping_pet_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://database:27017/shopping-pet
      - JWT_SECRET=supersecret123
    depends_on:
      - database

  # Frontend (Nginx/Static files) Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopping_pet_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
    driver: local
