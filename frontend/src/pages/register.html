<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - ShopPet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .auth-container { max-width: 450px; margin: 100px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .auth-title { text-align: center; margin-bottom: 30px; color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus { border-color: #ff6b6b; outline: none; }
        .btn-auth { width: 100%; padding: 14px; background: #ff6b6b; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-auth:hover { background: #fa5252; }
        .auth-footer { text-align: center; margin-top: 20px; color: #666; }
        .auth-footer a { color: #ff6b6b; text-decoration: none; font-weight: 500; }
        .error-message { color: #dc3545; font-size: 0.9rem; margin-bottom: 15px; display: none; text-align: center; }
        .success-message { color: #28a745; font-size: 0.9rem; margin-bottom: 15px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 class="auth-title">Tham gia cộng đồng yêu thú cưng!</h2>
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Họ và tên</label>
                <input type="text" id="fullName" required placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" required placeholder="Ít nhất 6 ký tự">
            </div>
            <button type="submit" class="btn-auth">ĐĂNG KÝ</button>
        </form>
        <div class="auth-footer">
            Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5000/api';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const full_name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, email, password })
                });
                const result = await response.json();

                if (result.success) {
                    successDiv.textContent = result.message + ' Đang chuyển hướng đăng nhập...';
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Lỗi kết nối máy chủ!';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
