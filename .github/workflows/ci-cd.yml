name: Shopping Pet CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install

      # - name: Run Backend Tests
      #   working-directory: ./backend
      #   run: npm test

  docker-build-push:
    name: Build and Push Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    # Chỉ chạy deploy khi push vào nhánh main (không chạy cho Pull Request)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopping-pet-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopping-pet-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopping-pet-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopping-pet-frontend:${{ github.sha }}
